<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ClaimBot dashboard command center preview</title>
  <desc id="desc">Dark Kimi-inspired ClaimBot dashboard with sidebar, topbar, readiness cards, review queue, and launch proof panels.</desc>
  <rect width="1280" height="720" fill="#0f1117"/>
  <rect x="20" y="20" width="1240" height="680" rx="18" fill="#141621" stroke="#2f3345"/>
  <rect x="20" y="20" width="250" height="680" rx="18" fill="#10131c"/>
  <rect x="54" y="54" width="42" height="42" rx="10" fill="#221a35" stroke="#6f58a7"/>
  <text x="112" y="74" fill="#f0f0f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">ClaimBot</text>
  <text x="112" y="94" fill="#9ca3af" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Hosted client portal</text>
  <g fill="#1a1d27" stroke="#2f3345">
    <rect x="44" y="140" width="190" height="38" rx="8"/>
    <rect x="44" y="194" width="190" height="38" rx="8"/>
    <rect x="44" y="248" width="190" height="38" rx="8"/>
    <rect x="44" y="302" width="190" height="38" rx="8"/>
    <rect x="44" y="356" width="190" height="38" rx="8"/>
    <rect x="44" y="410" width="190" height="38" rx="8"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <text x="70" y="164" fill="#b892ff">Dashboard</text>
    <text x="70" y="218" fill="#d7d8e0">Goal Setup</text>
    <text x="70" y="272" fill="#d7d8e0">Review Center</text>
    <text x="70" y="326" fill="#d7d8e0">Claim Queue</text>
    <text x="70" y="380" fill="#d7d8e0">Packet Center</text>
    <text x="70" y="434" fill="#d7d8e0">Launch Readiness</text>
  </g>
  <rect x="294" y="44" width="920" height="58" rx="12" fill="#1a1d27" stroke="#2f3345"/>
  <text x="324" y="79" fill="#f0f0f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Your Claims, Under Control</text>
  <rect x="1018" y="58" width="166" height="30" rx="15" fill="#183423" stroke="#245f3d"/>
  <text x="1042" y="78" fill="#86efac" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">Shadow Mode Active</text>
  <rect x="294" y="126" width="572" height="178" rx="14" fill="#1a1d27" stroke="#2f3345"/>
  <text x="324" y="164" fill="#f0f0f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="850">Claim review command center</text>
  <text x="324" y="198" fill="#b9bbc8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Review scoped matches, proof gates, authorizations, and queue readiness without skipping safety checks.</text>
  <rect x="324" y="236" width="142" height="42" rx="8" fill="#b892ff"/>
  <text x="348" y="262" fill="#0f1117" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="900">Open Review</text>
  <rect x="482" y="236" width="160" height="42" rx="8" fill="#141621" stroke="#3a3f55"/>
  <text x="508" y="262" fill="#d7d8e0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">View Packets</text>
  <rect x="890" y="126" width="324" height="178" rx="14" fill="#1a1d27" stroke="#2f3345"/>
  <text x="916" y="162" fill="#f0f0f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Client preview gate</text>
  <text x="916" y="194" fill="#fbbf24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="850">9 / 15</text>
  <text x="916" y="222" fill="#b9bbc8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">launch packets ready</text>
  <rect x="916" y="248" width="246" height="12" rx="6" fill="#2f3345"/>
  <rect x="916" y="248" width="148" height="12" rx="6" fill="#fbbf24"/>
  <g fill="#1a1d27" stroke="#2f3345">
    <rect x="294" y="328" width="280" height="128" rx="14"/>
    <rect x="594" y="328" width="280" height="128" rx="14"/>
    <rect x="894" y="328" width="320" height="128" rx="14"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="320" y="364" fill="#9ca3af" font-size="12" font-weight="800">REVIEW QUEUE</text>
    <text x="320" y="398" fill="#60a5fa" font-size="34" font-weight="850">Scoped</text>
    <text x="320" y="428" fill="#b9bbc8" font-size="14">No proof bypass, no legal certainty claims.</text>
    <text x="620" y="364" fill="#9ca3af" font-size="12" font-weight="800">AUDIT TRAIL</text>
    <text x="620" y="398" fill="#22c55e" font-size="34" font-weight="850">Append-only</text>
    <text x="620" y="428" fill="#b9bbc8" font-size="14">Claim packets keep receipt-backed events.</text>
    <text x="920" y="364" fill="#9ca3af" font-size="12" font-weight="800">AUTOMATION POSTURE</text>
    <text x="920" y="398" fill="#b892ff" font-size="34" font-weight="850">Shadow</text>
    <text x="920" y="428" fill="#b9bbc8" font-size="14">External submission stays disabled by default.</text>
  </g>
  <rect x="294" y="484" width="920" height="164" rx="14" fill="#1a1d27" stroke="#2f3345"/>
  <text x="324" y="522" fill="#f0f0f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="850">Launch proof matrix</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">
    <rect x="324" y="548" width="830" height="28" rx="8" fill="#141621"/>
    <text x="344" y="567" fill="#fbbf24">Operator account settings</text>
    <text x="752" y="567" fill="#9ca3af">npm run operator:packet</text>
    <rect x="324" y="586" width="830" height="28" rx="8" fill="#141621"/>
    <text x="344" y="605" fill="#fbbf24">Hosted database</text>
    <text x="752" y="605" fill="#9ca3af">npm run hosted:db:packet</text>
    <rect x="324" y="624" width="830" height="28" rx="8" fill="#141621"/>
    <text x="344" y="643" fill="#86efac">PWA readiness packet</text>
    <text x="752" y="643" fill="#9ca3af">npm run pwa:packet</text>
  </g>
</svg>
