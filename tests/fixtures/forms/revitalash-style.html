<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RevitaLash Serum Class Action Claim</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; }
    label { display: block; margin: 12px 0 4px; }
    input, select { display: block; padding: 8px; width: 100%; box-sizing: border-box; }
    p.legal { margin: 20px 0; font-size: 13px; color: #333; }
    button { margin-top: 20px; padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>RevitaLash Serum Class Action Claim Form</h1>
  <p>If you purchased RevitaLash lash or brow serums between January 1, 2017 and December 29, 2025, you may be entitled to a cash payment.</p>

  <form action="/submitted" method="post">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" name="firstName" required>

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" name="lastName" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone">

    <label for="street">Street Address</label>
    <input type="text" id="street" name="street" required>

    <label for="city">City</label>
    <input type="text" id="city" name="city" required>

    <label for="state">State</label>
    <select id="state" name="state">
      <option value="">--</option>
      <option value="CA">California</option>
      <option value="NY">New York</option>
      <option value="TX">Texas</option>
      <option value="WA">Washington</option>
    </select>

    <label for="zip">Zip Code</label>
    <input type="text" id="zip" name="zip" required>

    <p class="legal">
      <label>
        <input type="checkbox" id="attest" name="attest" required>
        I, the undersigned, certify under penalty of perjury that the information I have provided is true and correct and that I purchased RevitaLash lash or brow serums during the class period.
      </label>
    </p>

    <button type="submit">Submit Claim</button>
  </form>
</body>
</html>
